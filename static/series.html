<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>G.C. Photography | Series</title>
	<link href="/styles.css" rel="stylesheet">
</head>

<body>
	<!-- Content -->
	<div id="series-page-content" class="vbox centered-main centered-cross no-select">
		<!-- Header -->
		<div class="hbox centered-cross box-spacing-sm align-start">
			<img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
			<h1 class="font-size-m">G.C. Photography</h1>
		</div>

		<div class="flex-one margin-l"></div>

		<!-- SeriesThumbnails -->
		<div class="center-self space-85 pos-rel">
			<div class="hbox centered-cross">
				<div style="background-color: transparent; width: 250px; height: 315px">
				</div>
				<div class="scale-on-hover pop-in delayed"
					style="background-color: gray; width: 315px; height: 315px">
				</div>
				<div style="background-color: transparent; width: 100px; height: 100px">
				</div>
				<div class="scale-on-hover-z pop-in delayed"
					style="background-color: gray; width: 500px; height: 500px">
				</div>
				<div style="background-color: transparent; width: 50px; height: 50px">
				</div>
				<div class="scale-on-hover pop-in delayed"
					style="background-color: gray; width: 250px; height: 250px">
				</div>
			</div>

			<div class="flex-one margin-m"></div>

			<div class="hbox centered-cross">
				<div class="scale-on-hover pop-in delayed"
					style="background-color: gray; width: 140px; height: 140px">
				</div>
				<div style="background-color: transparent; width: 50px; height: 140px">
				</div>
				<div class="scale-on-hover pop-in delayed"
					style="background-color: gray; width: 550px; height: 190px">
				</div>
				<div style="background-color: transparent; width: 550px; height: 190px">
				</div>
				<div class="scale-on-hover pop-in delayed"
					style="background-color: gray; width: 300px; height: 300px">
				</div>
			</div>

		</div>

		<!-- Image -->
		<img id="series-img" class="flexbox-res-img add-fade" src="/resources/series.webp"
			alt="A photo of a man sitting in a chair">

		<!-- Indicator -->
		<div id="indicator" class="hbox centered-main box-spacing-m bottom-centered">
			<h2 id="indicator-text" class="fade-in-text font-size-l font-weight-n">Series</h2>
			<div class="vbox box-spacing-sm">
				<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
					xmlns="http://www.w3.org/2000/svg">
					<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
				</svg>
				<svg id="indicator-active" width="15" height="15" xmlns="http://www.w3.org/2000/svg">
					<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
				</svg>
				<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
					xmlns="http://www.w3.org/2000/svg">
					<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
				</svg>
			</div>
		</div>
	</div>
	<script src="/index.js">
	</script>
</body>

</html>
