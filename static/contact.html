<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>G.C. Photography | Contact</title>
	<link href="/styles.css" rel="stylesheet">
</head>

<body>
	<!-- Content -->
	<div id="contact-page-content" class="vbox centered-main centered-cross stretched-height no-select">
		<!-- Header -->
		<div class="hbox centered-cross w100 padding-lr-175 fade">
			<div class="hbox centered-cross box-spacing-sm">
				<img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
				<h1 class="font-size-m">G.C. Photography</h1>
			</div>

			<div class="flex-one margin-m"></div>

			<!-- Indicator -->
			<div id="indicator" class="hbox centered-main box-spacing-m">
				<h2 id="indicator-text" class="fade-in-text font-size-l font-weight-n">Contact</h2>
				<div class="vbox box-spacing-sm">
					<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg id="indicator-active" width="15" height="15"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
				</div>
			</div>


		</div>

		<div class="flex-one"></div>

		<div class="hbox centered-main centered-cross ">
			<div class="flex-one"></div>

			<div class="pos-rel overflow-hd">
				<form id="contact-form" class="space-35 padding-m">
					<div class="vbox box-spacing-l">
						<div class="hbox box-spacing-2xl">

							<div class="input-wrap w50">
								<span class="bot-line"></span>
								<span class="top-line"></span>
								<input id="first-name" name="first-name" type="text"
									placeholder="First Name">
							</div>

							<div class="input-wrap w50">
								<span class="bot-line"></span>
								<span class="top-line"></span>
								<input id="last-name" name="last-name" type="text"
									placeholder="Last Name">
							</div>
						</div>


						<div class="input-wrap">
							<span class="bot-line"></span>
							<span class="top-line"></span>
							<input id="email" name="email" type="text" placeholder="Email">
						</div>

						<textarea class="padding-sm" id="message" name="message"
							placeholder="Your message..." rows="12"></textarea>

						<button class="black-btn" type="submit"
							onclick="togglePanel()">Submit</button>
					</div>
				</form>
				<div id="panel" class="panel delayed"></div>
			</div>

			<div class="flex-one"></div>


			<img id="contact-img" class="flexbox-res-img fade add-fade-out" src="/resources/contact.webp"
				alt="A silhoutte of a person's hand holding a camera lens">

		</div>

		<div class="flex-one"></div>
	</div>
	<script src="/index.js">
	</script>
</body>

</html>
