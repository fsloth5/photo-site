<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G.C. Photography</title>
  <link href="/styles.css" rel="stylesheet">
</head>

<body>
  <div id="home-page-content" class="vbox centered-main stretched-height no-select">
    <div class="vbox centered-main align-start stretched-height box-spacing-l w100 pos-rel">
      <!-- Header -->
      <div class="hbox centered-cross box-spacing-sm align-start fade w100">
        <img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
        <h1 class="font-size-m">G.C. Photography</h1>
      </div>

      <!-- Quotes -->
      <div class="vbox centered-main box-spacing-sm space-85 padding-sm font-size-s">
        <p class="fade align-end delayed">"Those moments that
          often
          times get overlooked"</p>

        <div class="flex-one margin-sm"></div>

        <p class="fade align-start margin-sm delayed">
          "I
          want to
          capture
          <strong>those</strong> moments"
        </p>

        <div class="flex-one margin-sm"></div>

        <p class="fade center-self delayed">"And to do that,
          I only
          ask one thing...</p>

        <!-- Image -->
        <img id="welcome-mobile-img" class="flexbox-res-img fade add-fade-out" src="/resources/main_mobile.webp"
          alt="A portrait of a woman">

        <p class="center-self fade delayed delay1_5">
          ...let me
          into
          your world even if for just
          a brief
          moment."</p>
      </div>

      <!-- Indicator -->
      <div id="indicator" class="hbox centered-cross box-spacing-m align-end flex-one">
        <h2 id="indicator-text" class="fade-in-text font-size-l font-weight-n">Welcome!</h2>
        <div class="vbox box-spacing-sm">
          <svg id="indicator-active" width="12" height="12" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="6" cy="6" rx="6" ry="6" />
          </svg>
          <svg class="collapsible" width="12" height="12" fill="none" stroke="black" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="6" cy="6" rx="6" ry="6" />
          </svg>
          <svg class="collapsible" width="12" height="12" fill="none" stroke="black" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="6" cy="6" rx="6" ry="6" />
          </svg>
        </div>
      </div>

      <div class="padding-xs"></div>
    </div>
  </div>

  <script src="/index.js">
  </script>
</body>

</html>
