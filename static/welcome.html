<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>G.C. Photography</title>
	<link href="/styles.css" rel="stylesheet">
</head>

<body>
	<!-- Content -->
	<div id="home-page-content" class="hbox centered-main stretched-height">

		<div class="vbox centered-main align-start stretched-height"> <!-- 1st Column -->

			<!-- Header -->
			<div class="hbox centered-cross box-spacing-sm align-start">
				<img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
				<h1 class="font-size-m">G.C. Photography</h1>
			</div>


			<!-- Quotes -->
			<div class="vbox box-spacing-sm space-85 padding-sm font-size-s">
				<p class="fade-text align-end" style="animation-delay: 0s">"Those moments that often
					times get overlooked"</p>
				<div class="flex-one margin-sm"></div>
				<p class="fade-text align-start margin-sm" style="animation-delay: 0.75s">"I want to
					capture
					<strong>those</strong> moments"
				</p>
				<div class="flex-one margin-sm"></div>
				<p class="fade-text align-start" style="animation-delay: 1.5s">"And to do that, I only
					ask one thing...let me
					into
					your world even if for just
					a brief
					moment."</p>
			</div>

			<div class="flex-one margin-sm"></div>

			<!-- Indicator -->
			<div class="hbox centered-cross box-spacing-m flex-one align-end">
				<h2 class="fade-in-text font-size-l font-weight-n">Welcome!</h2>
				<div class="vbox box-spacing-sm">
					<svg width="15" height="15" xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
				</div>
			</div>

		</div>

		<!-- Image -->
		<img class="flexbox-res-img" src="/resources/main.webp" alt="A portrait of a woman" width="750">
	</div>
</body>

</html>
