<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>G.C. Photography</title>
	<link href="/styles.css" rel="stylesheet">
</head>

<body>
	<!-- Content -->
	<div id="home-page-content" class="hbox centered-main stretched-height no-select">

		<div class="vbox centered-main align-start stretched-height box-spacing-l">
			<!-- Header -->
			<div class="hbox centered-cross box-spacing-sm align-start">
				<img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
				<h1 class="font-size-m">G.C. Photography</h1>
			</div>


			<!-- Quotes -->
			<div class="vbox box-spacing-sm space-85 padding-sm font-size-s">
				<p class="fade align-end delay_0 delayed">"Those moments that
					often
					times get overlooked"</p>
				<div class="flex-one margin-sm"></div>
				<p class="fade align-start margin-sm delay_075 delayed" style="animation-delay: 0.75s">
					"I
					want to
					capture
					<strong>those</strong> moments"
				</p>
				<div class="flex-one margin-sm"></div>
				<p class="fade align-start delay1_5 delayed">"And to do that,
					I only
					ask one thing...let me
					into
					your world even if for just
					a brief
					moment."</p>
			</div>

			<!-- Indicator -->
			<div id="indicator" class="hbox centered-cross box-spacing-m align-end flex-one">
				<h2 id="indicator-text" class="fade-in-text font-size-l font-weight-n">Welcome!</h2>
				<div class="vbox box-spacing-sm">
					<svg id="indicator-active" width="15" height="15"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
				</div>
			</div>

		</div>

		<!-- Image -->
		<img class="flexbox-res-img add-fade" src="/resources/main.webp" alt="A portrait of a woman"
			width="750">
	</div>
	<script src="/index.js">
	</script>
</body>

</html>
