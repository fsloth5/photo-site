<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>G.C. Photography</title>
	<link href="/styles.css" rel="stylesheet">
</head>

<body>
	<div id="series-page-content" class="hbox centered-main stretched-height">

		<div class="vbox centered-main stretched-height pos-rel">

			<div class="vbox centered-main align-start"> <!-- 1st Column -->

				<!-- Header -->
				<div class="hbox centered-cross box-spacing-sm align-start">
					<img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
					<h1 class="font-size-m">G.C. Photography</h1>
				</div>



				<!-- Image -->
				<img class="flexbox-res-img space-75" src="/resources/series.webp"
					alt="A photo of a man sitting in a chair" width="635">
			</div>


			<!-- Indicator -->
			<div id="series-indicator" class="hbox centered-cross box-spacing-m flex-one align-start">
				<h2 class="fade-in-text font-size-l font-weight-n">Series</h2>
				<div class="vbox box-spacing-sm">
					<svg width="15" height="15" xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
				</div>
			</div>
		</div>

	</div>
