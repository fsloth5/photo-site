<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>G.C. Photography | Albums</title>
	<link href="/styles.css" rel="stylesheet">
</head>

<body>
	<!-- Content -->
	<div id="album-page-content" class="stretched-height">

		<!-- Header -->
		<div class="hbox centered-cross box-spacing-sm align-start fade">
			<img src="/resources/logo.svg" alt="The comany's logo" width="32" height="32">
			<h1 class="font-size-m">G.C. Photography</h1>
		</div>


		<div class="vbox centered-main centered-cross no-select stretched-height box-spacing-m">
			<!-- AlbumThumbnails -->
			<div id="album-thumbnails" class="photo-wall center-self pos-rel">

				<!-- Row 1 -->
				<div class="scale-on-hover pop-in delayed photo tall"></div>
				<div class="scale-on-hover pop-in delayed photo huge"></div>
				<div class="scale-on-hover pop-in delayed photo medium"></div>

				<!-- Row 2 -->
				<div class="scale-on-hover pop-in delayed photo small"></div>
				<div class="scale-on-hover pop-in delayed photo wide"></div>
				<div class="scale-on-hover pop-in delayed photo tall"></div>

				<!-- Row 3 -->
				<div class="scale-on-hover pop-in delayed photo small"></div>
				<div class="scale-on-hover pop-in delayed photo wide"></div>
				<div class="scale-on-hover pop-in delayed photo tall"></div>

				<!-- Row 4 -->
				<div class="scale-on-hover pop-in delayed photo small"></div>
				<div class="scale-on-hover pop-in delayed photo wide"></div>
				<div class="scale-on-hover pop-in delayed photo tall"></div>

				<!-- Row 5 -->
				<div class="scale-on-hover pop-in delayed photo tall"></div>
				<div class="scale-on-hover pop-in delayed photo huge"></div>
				<div class="scale-on-hover pop-in delayed photo medium"></div>

			</div>


			<!-- Image -->
			<img id="album-img" class="flexbox-res-img add-fade-out" src="/resources/series.webp"
				alt="A photo of a man sitting in a chair">


			<!-- Indicator -->
			<div id="indicator" class="bg-white hbox centered-main box-spacing-m align-end">
				<h2 id="indicator-text" class="fade-in-text font-size-xl font-weight-n">Albums</h2>
				<div class="vbox box-spacing-sm">
					<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg id="indicator-active" width="15" height="15"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
					<svg class="collapsible" width="15" height="15" fill="none" stroke="black"
						xmlns="http://www.w3.org/2000/svg">
						<ellipse cx="7.5" cy="7.5" rx="7.5" ry="7.5" />
					</svg>
				</div>
			</div>
		</div>
	</div>
	<script src="/index.js">
	</script>
</body>

</html>
